          id="24mm_ribbon"

      const prop = {
        name: "prop.xml",
        lastModified: new Date(),
        input:
          '<?xml version="1.0" encoding="UTF-8"?> <meta:properties xmlns:meta="http://schemas.brother.info/ptouch/2007/lbx/meta" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/"><meta:appName>com.brother.PtouchEditor</meta:appName><dc:title></dc:title><dc:subject></dc:subject><dc:creator></dc:creator><meta:keyword></meta:keyword><dc:description></dc:description><meta:template></meta:template><dcterms:created>2026-02-02T18:12:13Z</dcterms:created><dcterms:modified>2026-02-02T18:16:23Z</dcterms:modified><meta:lastPrinted></meta:lastPrinted><meta:modifiedBy></meta:modifiedBy><meta:revision>17</meta:revision><meta:editTime>0</meta:editTime><meta:numPages>1</meta:numPages><meta:numWords>0</meta:numWords><meta:numChars>0</meta:numChars><meta:security>0</meta:security><meta:transferScript></meta:transferScript></meta:properties>',
      };

      async function make_label(item_id, template) {
        let label_template;

        switch (template) {
          case "12mm":
            label_template = db_12mm_label_template;
            break;

          case "18mm":
            label_template = db_18mm_label_template;
            break;

          case "18mm_flag":
            label_template = db_18mm_flag_template;
            break;

          case "18mm_ribbon":
            label_template = db_18mm_ribbon_template;
            break;
        }
        const label = label_template.replaceAll("{ITEM_ID}", item_id);
        const db_label = {
          name: "label.xml",
          lastModified: new Date(),
          input: label,
        };

        const blob = await downloadZip([prop, db_label]).blob();

        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "hs3_db_label_" + template + "_" + item_id + ".lbx";
        link.click();
      }

      document.addEventListener("DOMContentLoaded", () => {
        const dialog = document.querySelector("dialog");

        Array.prototype.slice
          .call(document.getElementsByTagName("button"))
          .forEach((element) => {
            if (element.id.startsWith("btn_")) {
              element.addEventListener("click", (e) => {
                const item_id = e.target.id.replace("btn_", "");
                document.getElementById("item_id").value = item_id;
                dialog.showModal();
                document.getElementById("download").onclick = function () {
                  const item_id = document.getElementById("item_id").value;
                  const dialog = document.querySelector("dialog");
                  const template = document.querySelector("input:checked").id;
                  make_label(item_id, template);
                  dialog.close();
                };
              });
            }
          });
      });
    </script>
